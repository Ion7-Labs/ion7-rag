<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
  <style>
    .box        { fill: none; stroke: #6b7280; stroke-width: 1.4; rx: 6; ry: 6; }
    .box-root   { fill: #eef2ff; stroke: #4f46e5; }
    .box-pipe   { fill: #fef3c7; stroke: #d97706; }
    .box-load   { fill: #ecfeff; stroke: #0891b2; }
    .box-chunk  { fill: #f0fdf4; stroke: #16a34a; }
    .box-store  { fill: #fdf4ff; stroke: #9333ea; }
    .box-ret    { fill: #fff7ed; stroke: #ea580c; }
    .box-agent  { fill: #fdf2f8; stroke: #db2777; }
    .box-eval   { fill: #fef2f2; stroke: #dc2626; }
    .box-util   { fill: #f5f5f4; stroke: #78716c; }
    .label      { fill: #1f2937; font-weight: 600; font-size: 13px; }
    .sub        { fill: #4b5563; font-size: 11px; }
    .group      { fill: #1f2937; font-weight: 700; font-size: 12px; }
    .link       { stroke: #9ca3af; stroke-width: 1; fill: none; }
    @media (prefers-color-scheme: dark) {
      .box        { stroke: #9ca3af; }
      .box-root   { fill: #1e1b4b; stroke: #818cf8; }
      .box-pipe   { fill: #422006; stroke: #fbbf24; }
      .box-load   { fill: #083344; stroke: #22d3ee; }
      .box-chunk  { fill: #14532d; stroke: #4ade80; }
      .box-store  { fill: #4a044e; stroke: #d946ef; }
      .box-ret    { fill: #431407; stroke: #fb923c; }
      .box-agent  { fill: #500724; stroke: #f472b6; }
      .box-eval   { fill: #450a0a; stroke: #f87171; }
      .box-util   { fill: #1c1917; stroke: #a8a29e; }
      .label      { fill: #e5e7eb; }
      .sub, .group { fill: #d1d5db; }
      .link       { stroke: #6b7280; }
    }
  </style>

  <!-- Root -->
  <rect class="box box-root" x="390" y="20" width="160" height="50"/>
  <text class="label" x="470" y="42" text-anchor="middle">ion7.rag</text>
  <text class="sub"   x="470" y="58" text-anchor="middle">init.lua — lazy façade</text>

  <!-- Pipeline + retrieve -->
  <rect class="box box-pipe" x="60"  y="110" width="200" height="60"/>
  <text class="label" x="160" y="132" text-anchor="middle">Pipeline</text>
  <text class="sub"   x="160" y="148" text-anchor="middle">orchestrator</text>
  <text class="sub"   x="160" y="162" text-anchor="middle">ingest · retrieve · ask</text>

  <rect class="box box-pipe" x="290" y="110" width="180" height="60"/>
  <text class="label" x="380" y="132" text-anchor="middle">retrieve</text>
  <text class="sub"   x="380" y="148" text-anchor="middle">embed q → vec + lex + hype</text>
  <text class="sub"   x="380" y="162" text-anchor="middle">→ fuse</text>

  <rect class="box box-pipe" x="500" y="110" width="180" height="60"/>
  <text class="label" x="590" y="132" text-anchor="middle">embed  ·  hype</text>
  <text class="sub"   x="590" y="148" text-anchor="middle">query / chunk vectors</text>
  <text class="sub"   x="590" y="162" text-anchor="middle">HyPE Generator</text>

  <rect class="box box-pipe" x="710" y="110" width="180" height="60"/>
  <text class="label" x="800" y="132" text-anchor="middle">context</text>
  <text class="sub"   x="800" y="148" text-anchor="middle">Enricher</text>
  <text class="sub"   x="800" y="162" text-anchor="middle">Anthropic Contextual</text>

  <!-- loader/ -->
  <text class="group" x="60" y="210">loader/   input format → Doc</text>
  <rect class="box box-load" x="60"  y="220" width="160" height="44"/>
  <text class="label" x="140" y="240" text-anchor="middle">init</text>
  <text class="sub"   x="140" y="256" text-anchor="middle">format detection · registry</text>

  <rect class="box box-load" x="240" y="220" width="120" height="44"/>
  <text class="label" x="300" y="240" text-anchor="middle">text</text>
  <text class="sub"   x="300" y="256" text-anchor="middle">passthrough</text>

  <rect class="box box-load" x="380" y="220" width="160" height="44"/>
  <text class="label" x="460" y="240" text-anchor="middle">markdown</text>
  <text class="sub"   x="460" y="256" text-anchor="middle">cmark · H1-H6 sections</text>

  <rect class="box box-load" x="560" y="220" width="160" height="44"/>
  <text class="label" x="640" y="240" text-anchor="middle">html</text>
  <text class="sub"   x="640" y="256" text-anchor="middle">gumbo · DOM walker</text>

  <!-- chunk/ -->
  <text class="group" x="60" y="295">chunk/   Doc → Chunk[]</text>
  <rect class="box box-chunk" x="60"  y="305" width="160" height="44"/>
  <text class="label" x="140" y="325" text-anchor="middle">init</text>
  <text class="sub"   x="140" y="341" text-anchor="middle">chunker registry</text>

  <rect class="box box-chunk" x="240" y="305" width="220" height="44"/>
  <text class="label" x="350" y="325" text-anchor="middle">recursive</text>
  <text class="sub"   x="350" y="341" text-anchor="middle">separator hierarchy + glue + overlap</text>

  <rect class="box box-chunk" x="480" y="305" width="240" height="44"/>
  <text class="label" x="600" y="325" text-anchor="middle">late</text>
  <text class="sub"   x="600" y="341" text-anchor="middle">Günther per-token mean-pool</text>

  <!-- db/ -->
  <text class="group" x="60" y="380">db/   two-DB SQLite store</text>
  <rect class="box box-store" x="60"  y="390" width="130" height="44"/>
  <text class="label" x="125" y="410" text-anchor="middle">init</text>
  <text class="sub"   x="125" y="426" text-anchor="middle">open + ATTACH idx</text>

  <rect class="box box-store" x="210" y="390" width="120" height="44"/>
  <text class="label" x="270" y="410" text-anchor="middle">schema</text>
  <text class="sub"   x="270" y="426" text-anchor="middle">migrations</text>

  <rect class="box box-store" x="350" y="390" width="120" height="44"/>
  <text class="label" x="410" y="410" text-anchor="middle">chunks</text>
  <text class="sub"   x="410" y="426" text-anchor="middle">canonical truth</text>

  <rect class="box box-store" x="490" y="390" width="120" height="44"/>
  <text class="label" x="550" y="410" text-anchor="middle">vec</text>
  <text class="sub"   x="550" y="426" text-anchor="middle">vec0 binary + fp32</text>

  <rect class="box box-store" x="630" y="390" width="120" height="44"/>
  <text class="label" x="690" y="410" text-anchor="middle">lex</text>
  <text class="sub"   x="690" y="426" text-anchor="middle">FTS5 BM25</text>

  <rect class="box box-store" x="770" y="390" width="120" height="44"/>
  <text class="label" x="830" y="410" text-anchor="middle">hype</text>
  <text class="sub"   x="830" y="426" text-anchor="middle">vec0 aux columns</text>

  <!-- retrieve/rerank/route -->
  <text class="group" x="60" y="465">fusion/                                   rerank/                                   route/</text>
  <rect class="box box-ret" x="60"  y="475" width="320" height="44"/>
  <text class="label" x="220" y="495" text-anchor="middle">rrf  ·  dbsf  ·  cc</text>
  <text class="sub"   x="220" y="511" text-anchor="middle">reciprocal rank · z-score · min-max convex</text>

  <rect class="box box-ret" x="400" y="475" width="240" height="44"/>
  <text class="label" x="520" y="495" text-anchor="middle">pointwise</text>
  <text class="sub"   x="520" y="511" text-anchor="middle">yes / no logprob judge</text>

  <rect class="box box-ret" x="660" y="475" width="240" height="44"/>
  <text class="label" x="780" y="495" text-anchor="middle">tfidf</text>
  <text class="sub"   x="780" y="511" text-anchor="middle">centroid classifier</text>

  <!-- agent/ -->
  <text class="group" x="60" y="555">agent/   generation-time control loops</text>
  <rect class="box box-agent" x="60"  y="565" width="240" height="44"/>
  <text class="label" x="180" y="585" text-anchor="middle">crag</text>
  <text class="sub"   x="180" y="601" text-anchor="middle">corrective : evaluate → reformulate → retry</text>

  <rect class="box box-agent" x="320" y="565" width="280" height="44"/>
  <text class="label" x="460" y="585" text-anchor="middle">self_rag</text>
  <text class="sub"   x="460" y="601" text-anchor="middle">reflective via grammar-constrained JSON</text>

  <rect class="box box-agent" x="620" y="565" width="280" height="44"/>
  <text class="label" x="760" y="585" text-anchor="middle">prompts</text>
  <text class="sub"   x="760" y="601" text-anchor="middle">reformulation · reflection templates</text>

  <!-- eval/ + util -->
  <text class="group" x="60" y="645">eval/   reference-free RAGAs metrics                                                                util/</text>
  <rect class="box box-eval" x="60"  y="655" width="200" height="44"/>
  <text class="label" x="160" y="675" text-anchor="middle">faithfulness</text>
  <text class="sub"   x="160" y="691" text-anchor="middle">claims grounded ratio</text>

  <rect class="box box-eval" x="280" y="655" width="220" height="44"/>
  <text class="label" x="390" y="675" text-anchor="middle">context_precision</text>
  <text class="sub"   x="390" y="691" text-anchor="middle">rank-weighted relevance</text>

  <rect class="box box-eval" x="520" y="655" width="180" height="44"/>
  <text class="label" x="610" y="675" text-anchor="middle">lynx</text>
  <text class="sub"   x="610" y="691" text-anchor="middle">PASS / FAIL judge</text>

  <rect class="box box-util" x="720" y="655" width="180" height="44"/>
  <text class="label" x="810" y="675" text-anchor="middle">util.log</text>
  <text class="sub"   x="810" y="691" text-anchor="middle">mirrors core.util.log</text>

  <!-- Façade arrows down -->
  <path class="link" d="M 470 70  L 470 90  L 160 90  L 160 110"/>
  <path class="link" d="M 470 90  L 380 90  L 380 110"/>
  <path class="link" d="M 470 90  L 590 90  L 590 110"/>
  <path class="link" d="M 470 90  L 800 90  L 800 110"/>
</svg>
